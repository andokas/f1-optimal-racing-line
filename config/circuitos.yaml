# Parámetros específicos por circuito que no se pueden derivar de telemetría.
#
# v_max_drs_kmh:  velocidad punta con DRS según speed trap oficial FIA.
#                 Si no se especifica, se usa el máximo de telemetría (fallback).
#
# r_min_m:        radio mínimo físico real del circuito (curva más cerrada).
#                 Valores κ > 1/r_min son artefactos de np.gradient.
#                 Default: 30 m.
#
# track_width_m:  anchura útil de pista (bordillo a bordillo).
#                 d_max = track_width_m/2 - 0.5 m (margen de seguridad).
#                 Default: 12 m.
#
# Los nombres deben coincidir con el argumento --circuit del script
# (case-insensitive, espacios y guiones normalizados a _).

circuits:
  barcelona:
    v_max_drs_kmh: 340
    r_min_m: 30

